version: "3.9"

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testiny-db
    volumes:
      - ./data:/data
      - ./db:/app/db
    environment:
      - DB_PATH=/data/testiny.db

  api:
    build: ./api
    container_name: testiny-api
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/testiny.db
      - SESSION_SECRET=${SESSION_SECRET:-qaira-dev-secret}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      - db
