global
  log stdout format raw local0
  maxconn 4096

defaults
  log global
  mode http
  option httplog
  option forwardfor
  timeout connect 5s
  timeout client 60s
  timeout server 60s

frontend qaira_public
  bind *:80
  http-request set-header X-Forwarded-Proto http
  acl qaira_api path_beg /api /health /metrics
  use_backend qaira_api if qaira_api
  default_backend qaira_frontend

backend qaira_api
  balance roundrobin
  option httpchk GET /health
  http-check expect status 200
  server api api:3000 check

backend qaira_frontend
  balance roundrobin
  option httpchk GET /
  http-check expect status 200
  server frontend frontend:80 check

frontend haproxy_stats
  bind *:8404
  stats enable
  stats uri /stats
  stats refresh 10s
  stats show-node
