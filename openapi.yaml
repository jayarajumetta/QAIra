          description: Schedule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /execution-schedules/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      tags: [Execution Schedules]
      summary: Get execution schedule by ID
      responses:
        "200":
          description: Execution schedule record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionSchedule"
    put:
      tags: [Execution Schedules]
      summary: Update execution schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExecutionScheduleRequest"
      responses:
        "200":
          description: Update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatedResponse"
    delete:
      tags: [Execution Schedules]
      summary: Delete execution schedule
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"
  /execution-schedules/{id}/run:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    post:
      tags: [Execution Schedules]
      summary: Run an execution schedule immediately
      responses:
        "200":
          description: New execution identifier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"

  /execution-results:
    get:
      tags: [Execution Results]
      summary: List execution results
      parameters:
        - $ref: "#/components/parameters/ExecutionIdQuery"
        - $ref: "#/components/parameters/TestCaseIdQuery"
        - $ref: "#/components/parameters/AppTypeIdQuery"
      responses:
        "200":
          description: List of execution results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExecutionResult"
    post:
      tags: [Execution Results]
      summary: Create execution result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExecutionResultRequest"
      responses:
        "200":
          description: Execution result created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
  /execution-results/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      tags: [Execution Results]
      summary: Get execution result by ID
      responses:
        "200":
          description: Execution result record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionResult"
    put:
      tags: [Execution Results]
      summary: Update execution result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExecutionResultRequest"
      responses:
        "200":
          description: Update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatedResponse"
    delete:
      tags: [Execution Results]
      summary: Delete execution result
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"

  /api/testengine/callbacks/runs:
    post:
      tags: [Test Engine]
      summary: Receive signed Test Engine execution callbacks
      parameters:
        - $ref: "#/components/parameters/TestEngineSignatureHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestEngineCallbackRequest"
      responses:
        "200":
          description: Callback accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestEngineCallbackAcceptedResponse"

  /testengine/internal/jobs/lease:
    post:
      tags: [Test Engine]
      summary: "Internal: lease the next queued Test Engine job"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestEngineLeaseRequest"
      responses:
        "200":
          description: Leased job or null when no work is available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestEngineLeaseResponse"
  /testengine/internal/jobs/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      tags: [Test Engine]
      summary: "Internal: get a queued Test Engine job by ID"
      responses:
        "200":
          description: Queued job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestEngineQueuedJob"
  /testengine/internal/jobs/{id}/start:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    post:
      tags: [Test Engine]
      summary: "Internal: mark a queued job as running"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestEngineJobStartRequest"
      responses:
        "200":
          description: Job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestEngineJobStartedResponse"
  /testengine/internal/jobs/{id}/steps/{stepId}/execute:
    parameters:
      - $ref: "#/components/parameters/IdParam"
      - $ref: "#/components/parameters/StepIdPathParam"
    post:
      tags: [Test Engine]
      summary: "Internal: execute an API step for a queued job"
      responses:
        "200":
          description: Step execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestEngineApiStepExecutionResponse"
  /testengine/internal/jobs/{id}/steps/{stepId}/report:
    parameters:
      - $ref: "#/components/parameters/IdParam"
      - $ref: "#/components/parameters/StepIdPathParam"
    post:
      tags: [Test Engine]
      summary: "Internal: report a queued step result back to QAira"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestEngineStepReportRequest"
      responses:
        "200":
          description: Step report accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestEngineStepReportResponse"
  /testengine/internal/jobs/{id}/complete:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    post:
      tags: [Test Engine]
      summary: "Internal: complete a queued Test Engine job"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestEngineJobCompletionRequest"
      responses:
        "200":
          description: Job completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestEngineJobCompletionResponse"
  /testengine/internal/jobs/{id}/fail:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    post:
      tags: [Test Engine]
      summary: "Internal: fail a queued Test Engine job"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestEngineJobFailRequest"
      responses:
        "200":
          description: Job completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestEngineJobCompletionResponse"
components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    ProjectIdQuery:
      name: project_id
      in: query
      schema:
        type: string
    UserIdQuery:
      name: user_id
      in: query
      schema:
        type: string
    RoleIdQuery:
      name: role_id
      in: query
      schema:
        type: string
    AppTypeIdQuery:
      name: app_type_id
      in: query
      schema:
        type: string
    IntegrationTypeQuery:
      name: type
      in: query
      schema:
        $ref: "#/components/schemas/IntegrationType"
    IsActiveQuery:
      name: is_active
      in: query
      schema:
        type: boolean
    ParentIdQuery:
      name: parent_id
      in: query
      schema:
        type: string
        description: Use the literal string `null` to filter root suites.
    SuiteIdQuery:
      name: suite_id
      in: query
      schema:
        type: string
    RequirementIdQuery:
      name: requirement_id
      in: query
      schema:
        type: string
    TestCaseIdQuery:
      name: test_case_id
      in: query
      schema:
        type: string
    TestCaseIdPathParam:
      name: testCaseId
      in: path
      required: true
      schema:
        type: string
    ExecutionIdQuery:
      name: execution_id
      in: query
      schema:
        type: string
    StepIdPathParam:
      name: stepId
      in: path
      required: true
      schema:
        type: string
    TestEngineSignatureHeader:
      name: x-testengine-signature
      in: header
      required: true
      schema:
        type: string
      description: HMAC SHA-256 signature of the raw callback payload.
    StatusQuery:
      name: status
      in: query
      schema:
        type: string
    PriorityQuery:
      name: priority
      in: query
      schema:
        type: integer
    ExecutionStatusQuery:
      name: status
      in: query
      schema:
        type: string
        enum: [queued, running, completed, failed, aborted]
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    IdResponse:
      type: object
      properties:
        id:
          type: string
      required: [id]
    UpdatedResponse:
      type: object
      properties:
        updated:
          type: boolean
          example: true
      required: [updated]
    DeletedResponse:
      type: object
      properties:
        deleted:
          type: boolean
          example: true
      required: [deleted]
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        error:
          type: string
        message:
          type: string
      required: [statusCode, error, message]
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string, nullable: true }
        created_at: { type: string }
    SessionResponse:
      type: object
      properties:
        token: { type: string }
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]
    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
        name: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
    CreateUserRequest:
      type: object
      required: [email, password_hash]
      properties:
        email: { type: string, format: email }
        password_hash: { type: string }
        name: { type: string }
    UpdateUserRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password_hash: { type: string }
        name: { type: string }
    Role:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
    CreateRoleRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
    UpdateRoleRequest:
      type: object
      properties:
        name: { type: string }
    Project:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        created_by: { type: string, nullable: true }
        created_at: { type: string }
    CreateProjectRequest:
      type: object
      required: [name, created_by]
      properties:
        name: { type: string }
        description: { type: string }
        created_by: { type: string }
    UpdateProjectRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
    ProjectMember:
      type: object
      properties:
        id: { type: string }
        project_id: { type: string }
        user_id: { type: string }
        role_id: { type: string }
        created_at: { type: string }
    CreateProjectMemberRequest:
      type: object
      required: [project_id, user_id, role_id]
      properties:
        project_id: { type: string }
        user_id: { type: string }
        role_id: { type: string }
    UpdateProjectMemberRequest:
      type: object
      properties:
        project_id: { type: string }
        user_id: { type: string }
        role_id: { type: string }
    AppType:
      type: object
      properties:
        id: { type: string }
        project_id: { type: string }
        name: { type: string }
        type:
          type: string
          enum: [web, api, android, ios, unified]
        is_unified: { type: integer }
        created_at: { type: string }
    CreateAppTypeRequest:
      type: object
      required: [project_id, name, type]
      properties:
        project_id: { type: string }
        name: { type: string }
        type:
          type: string
          enum: [web, api, android, ios, unified]
        is_unified: { type: boolean }
    UpdateAppTypeRequest:
      type: object
      properties:
        name: { type: string }
        is_unified: { type: boolean }
    Requirement:
      type: object
      properties:
        id: { type: string }
        project_id: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        priority: { type: integer, nullable: true }
        status: { type: string, nullable: true }
        created_at: { type: string }
    CreateRequirementRequest:
      type: object
      required: [project_id, title]
      properties:
        project_id: { type: string }
        title: { type: string }
        description: { type: string }
        priority: { type: integer }
        status: { type: string }
    UpdateRequirementRequest:
      type: object
      properties:
        project_id: { type: string }
        title: { type: string }
        description: { type: string }
        priority: { type: integer }
        status: { type: string }
    BulkImportRequirementsRequest:
      type: object
      required: [project_id, rows]
      properties:
        project_id: { type: string }
        rows:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              description: { type: string }
              priority: { type: integer }
              status: { type: string }
    BulkImportRequirementsResponse:
      type: object
      properties:
        imported: { type: integer }
        failed: { type: integer }
        created:
          type: array
          items:
            type: object
            properties:
              row: { type: integer }
              id: { type: string }
              title: { type: string }
        errors:
          type: array
          items:
            type: object
            properties:
              row: { type: integer }
              title: { type: string, nullable: true }
              message: { type: string }
    TestSuite:
      type: object
      properties:
        id: { type: string }
        app_type_id: { type: string }
        name: { type: string }
        parent_id: { type: string, nullable: true }
        created_at: { type: string }
    CreateTestSuiteRequest:
      type: object
      required: [app_type_id, name]
      properties:
        app_type_id: { type: string }
        name: { type: string }
        parent_id: { type: string }
    UpdateTestSuiteRequest:
      type: object
      properties:
        name: { type: string }
        parent_id: { type: string }
    TestCase:
      type: object
      properties:
        id: { type: string }
        suite_id: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        priority: { type: integer, nullable: true }
        status: { type: string, nullable: true }
        requirement_id: { type: string, nullable: true }
        created_at: { type: string }
    CreateTestCaseRequest:
      type: object
      required: [suite_id, title]
      properties:
        suite_id: { type: string }
        title: { type: string }
        description: { type: string }
        priority: { type: integer }
        status: { type: string }
        requirement_id: { type: string }
    UpdateTestCaseRequest:
      type: object
      properties:
        suite_id: { type: string }
        title: { type: string }
        description: { type: string }
        priority: { type: integer }
        status: { type: string }
        requirement_id: { type: string }
    TestStep:
      type: object
      properties:
        id: { type: string }
        test_case_id: { type: string }
        step_order: { type: integer }
        action: { type: string, nullable: true }
        expected_result: { type: string, nullable: true }
    CreateTestStepRequest:
      type: object
      required: [test_case_id, step_order]
      properties:
        test_case_id: { type: string }
        step_order: { type: integer }
        action: { type: string }
        expected_result: { type: string }
    UpdateTestStepRequest:
      type: object
      properties:
        test_case_id: { type: string }
        step_order: { type: integer }
        action: { type: string }
        expected_result: { type: string }
    AnyObject:
      type: object
      additionalProperties: true
    StringMap:
      type: object
      additionalProperties:
        type: string
    IntegrationType:
      type: string
      enum: [llm, jira, email, google_auth, google_drive, github, testengine]
    EmailIntegrationConfig:
      type: object
      properties:
        host: { type: string }
        port: { type: integer }
        secure: { type: boolean }
        password: { type: string }
        sender_email: { type: string, format: email }
        sender_name: { type: string }
    GoogleAuthIntegrationConfig:
      type: object
      properties:
        client_id: { type: string }
    GoogleDriveIntegrationConfig:
      type: object
      properties:
        project_id: { type: string }
        folder_id: { type: string }
        schedule_mode: { type: string, enum: [manual, daily, weekly, monthly] }
        include_requirements_csv: { type: boolean }
        include_test_cases_csv: { type: boolean }
        next_sync_at: { type: string, format: date-time, nullable: true }
        last_synced_at: { type: string, format: date-time, nullable: true }
        last_sync_status: { type: string, nullable: true }
        last_sync_transaction_id: { type: string, nullable: true }
        last_sync_summary: { type: string, nullable: true }
    GithubIntegrationConfig:
      type: object
      properties:
        project_id: { type: string }
        owner: { type: string }
        repo: { type: string }
        branch: { type: string }
        directory: { type: string }
        file_extension: { type: string }
        schedule_mode: { type: string, enum: [manual, daily, weekly, monthly] }
        next_sync_at: { type: string, format: date-time, nullable: true }
        last_synced_at: { type: string, format: date-time, nullable: true }
        last_sync_status: { type: string, nullable: true }
        last_sync_transaction_id: { type: string, nullable: true }
        last_sync_summary: { type: string, nullable: true }
    TestEngineIntegrationConfig:
      type: object
      properties:
        project_id: { type: string, nullable: true }
        runner: { type: string, example: hybrid }
        dispatch_mode: { type: string, example: qaira-pull }
        execution_scope: { type: string, example: api+web }
        active_web_engine: { type: string, enum: [playwright, selenium] }
        browser: { type: string, enum: [chromium, firefox, webkit] }
        headless: { type: boolean }
        healing_enabled: { type: boolean }
        max_repair_attempts: { type: integer }
        trace_mode: { type: string, enum: [off, on, on-first-retry, retain-on-failure] }
        video_mode: { type: string, enum: [off, on, retain-on-failure] }
        capture_console: { type: boolean }
        capture_network: { type: boolean }
        artifact_retention_days: { type: integer }
        run_timeout_seconds: { type: integer }
        queue_poll_interval_minutes: { type: integer, example: 5 }
        promote_healed_patches: { type: string, example: review }
    Integration:
      type: object
      properties:
        id: { type: string }
        type:
          $ref: "#/components/schemas/IntegrationType"
        name: { type: string }
        base_url: { type: string, nullable: true }
        api_key: { type: string, nullable: true }
        model: { type: string, nullable: true }
        project_key: { type: string, nullable: true }
        username: { type: string, nullable: true }
        config:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/EmailIntegrationConfig"
            - $ref: "#/components/schemas/GoogleAuthIntegrationConfig"
            - $ref: "#/components/schemas/GoogleDriveIntegrationConfig"
            - $ref: "#/components/schemas/GithubIntegrationConfig"
            - $ref: "#/components/schemas/TestEngineIntegrationConfig"
            - $ref: "#/components/schemas/AnyObject"
        is_active: { type: boolean }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
    CreateIntegrationRequest:
      type: object
      required: [type, name]
      properties:
        type:
          $ref: "#/components/schemas/IntegrationType"
        name: { type: string }
        base_url: { type: string }
        api_key: { type: string }
        model: { type: string }
        project_key: { type: string }
        username: { type: string }
        config:
          oneOf:
            - $ref: "#/components/schemas/EmailIntegrationConfig"
            - $ref: "#/components/schemas/GoogleAuthIntegrationConfig"
            - $ref: "#/components/schemas/GoogleDriveIntegrationConfig"
            - $ref: "#/components/schemas/GithubIntegrationConfig"
            - $ref: "#/components/schemas/TestEngineIntegrationConfig"
            - $ref: "#/components/schemas/AnyObject"
        is_active: { type: boolean }
    UpdateIntegrationRequest:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/IntegrationType"
        name: { type: string }
        base_url: { type: string }
        api_key: { type: string }
        model: { type: string }
        project_key: { type: string }
        username: { type: string }
        config:
          oneOf:
            - $ref: "#/components/schemas/EmailIntegrationConfig"
            - $ref: "#/components/schemas/GoogleAuthIntegrationConfig"
            - $ref: "#/components/schemas/GoogleDriveIntegrationConfig"
            - $ref: "#/components/schemas/GithubIntegrationConfig"
            - $ref: "#/components/schemas/TestEngineIntegrationConfig"
            - $ref: "#/components/schemas/AnyObject"
        is_active: { type: boolean }
    TestIntegrationConnectionRequest:
      type: object
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/IntegrationType"
        base_url: { type: string }
        config:
          oneOf:
            - $ref: "#/components/schemas/TestEngineIntegrationConfig"
            - $ref: "#/components/schemas/AnyObject"
    TestEngineConnectionResponse:
      type: object
      properties:
        ok: { type: boolean }
        base_url: { type: string }
        health_url: { type: string }
        capabilities_url: { type: string }
        latency_ms: { type: integer }
        service: { type: string }
        runner: { type: string }
        ui: { type: string }
        control_plane: { type: string }
        execution_scope: { type: string }
        supported_step_types:
          type: array
          items:
            type: string
        supported_web_engines:
          type: array
          items:
            type: string
        qaira_result_log_compatibility: { type: string, nullable: true }
    AssignedUserSummary:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string, nullable: true }
        avatar_data_url: { type: string, nullable: true }
    KeyValueEntry:
      type: object
      properties:
        key: { type: string }
        value: { type: string }
        is_secret: { type: boolean, nullable: true }
    TestDataSetRow:
      type: object
      additionalProperties:
        type: string
    ExecutionEnvironmentSnapshot:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        base_url: { type: string, nullable: true }
        browser: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        variables:
          type: array
          items:
            $ref: "#/components/schemas/KeyValueEntry"
    ExecutionConfigurationSnapshot:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        browser: { type: string, nullable: true }
        mobile_os: { type: string, nullable: true }
        platform_version: { type: string, nullable: true }
        variables:
          type: array
          items:
            $ref: "#/components/schemas/KeyValueEntry"
    ExecutionDataSetSnapshot:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        mode: { type: string, enum: [key_value, table] }
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
