openapi: 3.0.3
info:
  title: QAIra API
  version: 1.0.0
  description: |
    OpenAPI specification for the current QAIra Fastify + PostgreSQL backend.
    This spec documents the implemented CRUD resources, request payloads,
    query filters, and the execution lifecycle actions.
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Auth
  - name: Users
  - name: Roles
  - name: Projects
  - name: Project Members
  - name: App Types
  - name: Integrations
  - name: Requirements
  - name: Test Suites
  - name: Test Cases
  - name: Test Steps
  - name: Executions
  - name: Execution Schedules
  - name: Execution Results
  - name: Test Engine
paths:
  /auth/signup:
    post:
      tags: [Auth]
      summary: Create account and start a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: Session payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /auth/login:
    post:
      tags: [Auth]
      summary: Login and return a signed session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Session payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /auth/session:
    get:
      tags: [Auth]
      summary: Resolve the current session from a Bearer token
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer token returned by the auth endpoints.
      responses:
        "200":
          description: Session payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /users:
    get:
      tags: [Users]
      summary: List users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags: [Users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
  /users/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      tags: [Users]
      summary: Get user by ID
      responses:
        "200":
          description: User record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "500":
