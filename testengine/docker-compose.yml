services:
  testengine:
    image: ${QAIRA_TESTENGINE_IMAGE:-qaira-testengine:latest}
    build:
      context: ./backend
    environment:
      PORT: 4301
      NODE_ENV: production
      ENGINE_NAME: QAira Test Engine
      ARTIFACT_ROOT: /artifacts
      QAIRA_API_BASE_URL: ${QAIRA_API_BASE_URL:-http://host.docker.internal:3000}
      QAIRA_TESTENGINE_SECRET: ${QAIRA_TESTENGINE_SECRET:-qaira-testengine-dev-secret}
      ENGINE_PUBLIC_URL: ${ENGINE_PUBLIC_URL:-http://localhost:4301}
      TESTENGINE_POLL_INTERVAL_MINUTES: ${TESTENGINE_POLL_INTERVAL_MINUTES:-5}
      TESTENGINE_POLL_INTERVAL_MS: ${TESTENGINE_POLL_INTERVAL_MS:-}
      SELENIUM_GRID_URL: ${SELENIUM_GRID_URL:-http://selenium-hub:4444/wd/hub}
      SELENIUM_VNC_PORT: ${SELENIUM_VNC_PORT:-7900}
      SELENIUM_LIVE_VIEW_URL: ${SELENIUM_LIVE_VIEW_URL:-http://localhost:7900/?autoconnect=1&resize=scale}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-qaira-testengine}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.name=qaira-testengine}
      OPS_TELEMETRY_ENABLED: ${OPS_TELEMETRY_ENABLED:-true}
      OPS_TELEMETRY_EVENTS_PATH: ${OPS_TELEMETRY_EVENTS_PATH:-/api/v1/events}
      OPS_TELEMETRY_BOARD_PATH: ${OPS_TELEMETRY_BOARD_PATH:-/ops-telemetry}
      OPS_TELEMETRY_SERVICE_NAME: ${OPS_TELEMETRY_SERVICE_NAME:-qaira-testengine}
      OPS_TELEMETRY_ENVIRONMENT: ${OPS_TELEMETRY_ENVIRONMENT:-production}
      OPS_TELEMETRY_STORE_PATH: ${OPS_TELEMETRY_STORE_PATH:-/artifacts/ops-telemetry-events.ndjson}
      OPS_TELEMETRY_MAX_EVENTS: ${OPS_TELEMETRY_MAX_EVENTS:-2000}
      OPS_TELEMETRY_API_KEY: ${OPS_TELEMETRY_API_KEY:-}
      OPS_TELEMETRY_API_KEY_HEADER: ${OPS_TELEMETRY_API_KEY_HEADER:-Authorization}
      OPS_TELEMETRY_API_KEY_PREFIX: ${OPS_TELEMETRY_API_KEY_PREFIX:-Bearer}
    ports:
      - "4301:4301"
    volumes:
      - testengine-artifacts:/artifacts
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4301/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));\""]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: always
    depends_on:
      - selenium-hub
      - selenium-node-chrome

  selenium-hub:
    image: ${QAIRA_SELENIUM_HUB_IMAGE:-selenium/hub:4.22.0}
    container_name: qaira-selenium-hub
    ports:
      - "4444:4444"
    restart: always

  selenium-node-chrome:
    image: ${QAIRA_SELENIUM_NODE_IMAGE:-selenium/node-chromium:4.22.0}
    container_name: qaira-selenium-node-chrome
    shm_size: 2gb
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 1
      SE_VNC_NO_PASSWORD: ${SE_VNC_NO_PASSWORD:-1}
    ports:
      - "${SELENIUM_VNC_PORT:-7900}:7900"
    depends_on:
      - selenium-hub
    restart: always

volumes:
  testengine-artifacts:
