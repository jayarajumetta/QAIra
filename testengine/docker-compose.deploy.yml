services:
  testengine:
    image: ${QAIRA_TESTENGINE_IMAGE:-jayarajumetta/qaira-testengine:latest}
    container_name: qaira-testengine
    environment:
      PORT: 4301
      NODE_ENV: production
      ENGINE_NAME: ${ENGINE_NAME:-QAira Test Engine}
      ARTIFACT_ROOT: /artifacts
      QAIRA_API_BASE_URL: ${QAIRA_API_BASE_URL:-http://host.docker.internal:3000}
      QAIRA_TESTENGINE_SECRET: ${QAIRA_TESTENGINE_SECRET:-qaira-testengine-dev-secret}
      ENGINE_PUBLIC_URL: ${ENGINE_PUBLIC_URL:-http://localhost:4301}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    ports:
      - "${TESTENGINE_PORT:-4301}:4301"
    volumes:
      - testengine-artifacts:/artifacts
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4301/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));\""]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: always

volumes:
  testengine-artifacts:
