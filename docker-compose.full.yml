services:
  postgres:
    image: postgres:16-alpine
    container_name: qaira-postgres
    ports:
      - "5432:5432"
    volumes:
      - qaira-postgres-data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qaira}
      POSTGRES_USER: ${POSTGRES_USER:-qaira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qaira}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qaira} -d ${POSTGRES_DB:-qaira}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: ${QAIRA_BACKEND_IMAGE:-jayarajumetta/qaira-backend:latest}
    container_name: qaira-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://qaira:qaira@postgres:5432/qaira}
      SESSION_SECRET: ${SESSION_SECRET:-qaira-dev-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    image: ${QAIRA_FRONTEND_IMAGE:-jayarajumetta/qaira-frontend:latest}
    container_name: qaira-frontend
    ports:
      - "8080:80"
    environment:
      QAIRA_API_BASE_URL: ${QAIRA_API_BASE_URL:-http://localhost:3000}
    depends_on:
      - api
    restart: always
volumes:
  qaira-postgres-data:
