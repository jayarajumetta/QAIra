services:
  api:
    image: jayarajumetta/qaira-backend:latest
    container_name: testiny-api
    ports:
      - "3000:3000"
    volumes:
      - qaira-data:/data
    environment:
      DB_PATH: /data/testiny.db
      SESSION_SECRET: ${SESSION_SECRET:-qaira-dev-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    restart: always

  frontend:
    image: jayarajumetta/qaira-frontend:latest
    container_name: qaira-frontend
    ports:
      - "8080:80"
    environment:
      QAIRA_API_BASE_URL: http://13.239.23.67:3000
    depends_on:
      - api
    restart: always
volumes:
  qaira-data: